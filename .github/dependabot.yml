# Canonical BASE for each repo's dependabot.yml, managed by fleet-sync
# (.github/workflows/fleet-sync.yml). Do NOT edit per-repo copies — fleet-sync
# ASSEMBLES the distributed file per repo: this base (github-actions only, which
# every repo has) plus one block from fleet/dependabot.d/ per package ecosystem
# whose ROOT manifest exists on the target (go.mod → gomod, Package.swift →
# swift, package.json → npm). An ecosystem configured without its manifest is
# NOT a no-op — Dependabot records a FAILING run every week (t-s3fp) — and a
# base-only overwrite ERASES a repo's real ecosystems (t-vhr9: chord's swift and
# study-engine's npm update entries were wiped, killing their bump PRs).
# Synced to: .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Wait 7 days after a release before proposing it — freshly published
    # versions are where supply-chain compromises surface (xz, tj-actions).
    cooldown:
      default-days: 7
    # Batch every action bump into ONE weekly PR (not one PR per action).
    groups:
      actions:
        patterns: ["*"]
    # gitmoji + Conventional Commits so bot PRs match the house convention
    # (CONTRIBUTING.md). Bots are exempt from commit-lint, so this is decoration.
    commit-message:
      prefix: ":arrow_up: build(deps)"

  # npm updates for the JS/TS repos (study-engine, …): dev-tooling bumps like
  # vite/electron. Appended by fleet-sync only where a root package.json exists
  # (fleet/dependabot.d/npm.yml — see the base fleet/dependabot.yml header for
  # the assembly scheme).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Same 7-day supply-chain cooldown as github-actions above.
    cooldown:
      default-days: 7
    groups:
      npm:
        patterns: ["*"]
    commit-message:
      prefix: ":arrow_up: build(deps)"
