# PR gate for the JS and Rust halves of the Tauri app. Third-party actions are
# hash-pinned per the fleet pinning policy (.github/zizmor.yml); actions/* ride tags.
name: ci

# main is gated too, not just PRs: fleet-sync pushes to it directly, so a
# PR-only trigger let a breakage land unchecked and ambush the next PR author
# instead of the commit that caused it (t-2qyb). PR branches keep firing on
# pull_request alone — `branches: [main]` means a push event never doubles up.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      # pnpm version comes from package.json "packageManager"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # the one gate, identical to local `pnpm check`: types/lint/format/test/
      # build. Contract tests skip themselves when the furrow binary is absent
      # (describe.skipIf), so check:test degrades to unit-only here. The build
      # step also proves allowBuilds (esbuild) took effect in CI.
      - run: pnpm check

  rust:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      # generate_context! requires frontendDist (../dist) to exist even for check
      - run: mkdir -p ../dist
      - run: cargo check --locked
      - run: cargo test --locked
